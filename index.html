<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadoras de materiales de construcción</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo">Calculadoras<span>Construcción</span></a>
        
        <nav class="nav-links" id="navLinks">
            <a href="index.html" class="hbtn active">Inicio</a>
            <a href="home.html" class="hbtn">Home</a>
            <a href="revista.html" class="hbtn">Revista</a>
            <a href="marketplace.html" class="hbtn">Marketplace</a>
        </nav>
        
        <button class="menu-toggle" id="menuToggle">☰</button>
    </header>

    <main>
        <!-- CATEGORÍAS -->
        <div class="cat-tabs">
            <button class="cat-btn active" onclick="showCat('estructura', this)">🏗 Estructura</button>
            <button class="cat-btn" onclick="showCat('mamposteria', this)">🧱 Mampostería</button>
            <button class="cat-btn" onclick="showCat('terminacion', this)">🎨 Terminación</button>
            <button class="cat-btn" onclick="showCat('seco', this)">📐 Seco</button>
            <button class="cat-btn" onclick="showCat('instalaciones', this)">🔌 Instalaciones</button>
            <button class="cat-btn" onclick="showCat('ferreteria', this)">🔩 Ferretería</button>
        </div>

        <!-- ESTRUCTURA -->
        <div id="cat-estructura" class="cat-panel active">
            <div class="mat-tabs">
                <button class="mat-btn active" onclick="showMat('estructura','hormigon',this)">Hormigón / Losa</button>
                <button class="mat-btn" onclick="showMat('estructura','hierros',this)">Hierros</button>
                <button class="mat-btn" onclick="showMat('estructura','mallas',this)">Mallas de hierro</button>
                <button class="mat-btn" onclick="showMat('estructura','cascote',this)">Cascote / Relleno</button>
                <button class="mat-btn" onclick="showMat('estructura','desencofrante',this)">Desencofrante</button>
            </div>

            <!-- Hormigón -->
            <div id="mat-hormigon" class="mat-panel active">
                <h2>Hormigón / Losa</h2>
                <div class="field"><label>Tipo de trabajo</label>
                    <select id="h-tipo" onchange="calcHormigon()">
                        <option value="losa">Losa (10 cm espesor)</option>
                        <option value="columna">Columna / viga</option>
                        <option value="zapata">Zapata de fundación</option>
                        <option value="piso">Piso de hormigón (8 cm)</option>
                    </select>
                </div>
                <div class="grid-3">
                    <div class="field"><label>Largo (m)</label><input type="number" id="h-largo" value="5" min="0.1" step="0.1" oninput="calcHormigon()"></div>
                    <div class="field"><label>Ancho (m)</label><input type="number" id="h-ancho" value="4" min="0.1" step="0.1" oninput="calcHormigon()"></div>
                    <div class="field"><label>Espesor (m)</label><input type="number" id="h-alto" value="0.10" min="0.01" step="0.01" oninput="calcHormigon()"></div>
                </div>
                <div class="results" id="res-hormigon"></div>
                <p class="tip">Mezcla H-20: 1 parte cemento, 2 arena, 3 piedra. +10% desperdicio.</p>
                <button class="btn-pedir" onclick="pedirMateriales(this)">Pedir estos materiales al corralón →</button>
            </div>

            <!-- Agrega aquí el resto de tus paneles (hierros, mallas, etc.) -->
            <!-- ... pega el resto de tu código original ... -->

        </div>

        <!-- Aquí van las otras categorías (mampostería, terminación, seco, etc.) -->

    </main>

    <footer>
        Calculadores de construcción — próximamente conectado al marketplace de corralones
    </footer>

    <script>
        // Menú móvil
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                menuToggle.textContent = navLinks.classList.contains('active') ? '✕' : '☰';
            });
        }

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                menuToggle.textContent = '☰';
            });
        });

        // === PEGA AQUÍ TODAS TUS FUNCIONES JAVASCRIPT ORIGINALES ===
        // (showCat, showMat, calcHormigon, calcLadrillos, etc.)

    </script>

</body>
</html>
