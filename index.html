<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadores de materiales — Materiales Ya</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #eef2f7; color: #1a1a1a; min-height: 100vh; }

  nav { background: #1a2744; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: relative; }
  nav .logo { color: #fff; font-size: 1.2rem; font-weight: 700; text-decoration: none; }
  nav .logo span { color: #90afd4; font-weight: 400; font-size: 0.85rem; margin-left: 8px; }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .nav-link { padding: 6px 14px; border-radius: 7px; border: 1px solid #2e4a7a; color: #90afd4; font-size: 12px; text-decoration: none; transition: all .15s; }
  .nav-link:hover, .nav-link.active { background: #fff; color: #1a2744; border-color: #fff; }
  @media(max-width:520px) { .nav-links { display: none; } }

  main { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }

  .cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .cat-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #d0dcea; background: #fff; color: #555; font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
  .cat-btn.active { background: #1a2744; color: #fff; border-color: #1a2744; }
  .cat-btn:hover:not(.active) { background: #e8eef5; }

  .mat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; padding: 10px; background: #e8eef5; border-radius: 8px; }
  .mat-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #d0dcea; background: #fff; color: #555; font-size: 12px; cursor: pointer; transition: all .15s; }
  .mat-btn.active { background: #1a2744; color: #fff; border-color: #1a2744; }
  .mat-btn:hover:not(.active) { background: #e8eef5; }

  .cat-panel { display: none; }
  .cat-panel.active { display: block; }
  .mat-panel { display: none; background: #fff; border-radius: 12px; border: 1px solid #d0dcea; padding: 1.5rem; }
  .mat-panel.active { display: block; }
  .mat-panel h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; color: #1a2744; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media(max-width:520px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 9px 12px; border: 1px solid #d0dcea; border-radius: 8px; font-size: 14px; color: #1a1a1a; background: #fafbfd; outline: none; transition: border .15s; }
  .field input:focus, .field select:focus { border-color: #1a2744; background: #fff; }

  .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 1.5rem; }
  .result-card { background: #eef2f7; border-radius: 8px; padding: 12px 14px; }
  .result-card .r-label { font-size: 11px; color: #5a8abf; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .result-card .r-value { font-size: 22px; font-weight: 700; color: #1a2744; line-height: 1.1; }
  .result-card .r-unit { font-size: 11px; color: #888; margin-top: 2px; }

  .tip { font-size: 12px; color: #888; margin-top: 1rem; background: #f5f8fc; border-radius: 8px; padding: 8px 12px; border-left: 3px solid #90afd4; }
  .btn-pedir { margin-top: 1.5rem; width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1a2744; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .btn-pedir:hover { opacity: .85; }

  footer { text-align: center; padding: 2rem; font-size: 12px; color: #aaa; }
  footer a { color: #5a8abf; text-decoration: none; margin: 0 8px; }

  .menu-toggle {
    display: none;
    background: none;
    border: 1px solid #2e4a7a;
    border-radius: 7px;
    color: #90afd4;
    font-size: 18px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .nav-links.open { 
    display: flex !important; 
    flex-direction: column; 
    position: absolute; 
    top: 56px; left: 0; right: 0; 
    background: #1a2744; 
    padding: 1rem; gap: 8px;
    z-index: 100;
    border-top: 1px solid #2e4a7a;
  }
  .nav-links.open .nav-link { width: 100%; text-align: center; padding: 10px; }
  @media(max-width:600px) {
    nav { padding: .875rem 1rem; position: relative; }
    nav .logo span { display: none; }
    .nav-links { display: none !important; }
    .menu-toggle { display: flex !important; }
  }

  @media(max-width:600px) {
    main { margin: 1rem auto; padding: 0 .75rem; }
    .cat-tabs { gap: 5px; }
    .cat-btn { padding: 6px 10px; font-size: 11px; }
    .mat-tabs { padding: 8px; gap: 5px; }
    .mat-btn { padding: 5px 8px; font-size: 11px; }
    .mat-panel { padding: 1rem; }
    .results { grid-template-columns: repeat(2, 1fr); }
    .result-card .r-value { font-size: 18px; }
  }

  .btn-editar, .btn-salir {
    padding: 6px 14px;
    border-radius: 7px;
    border: 1px solid transparent;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
  }
  .btn-editar { background:#1a4a8a; color:#fff; border-color:#1a4a8a; }
  .btn-salir { background:#d93025; color:#fff; border-color:#d93025; }

  .modal-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:9999;
    padding:16px;
    overflow:auto;
  }
  .modal-overlay.active { display:block; }
  .modal-box {
    max-width:980px;
    margin:40px auto;
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .modal-head {
    background:#1a2744;
    color:#fff;
    padding:16px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }
  .modal-head h3 { margin:0; font-size:1.05rem; }
  .modal-close {
    background:transparent;
    border:none;
    color:#fff;
    font-size:26px;
    cursor:pointer;
    line-height:1;
  }
  .modal-body { padding:18px; }
  .modal-toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .modal-toolbar button { padding:10px 14px; border:none; border-radius:8px; cursor:pointer; }
  .btn-secondary { background:#e8eef5; color:#1a2744; }
  .btn-danger { background:#d93025; color:#fff; }
  .corralones-table { width:100%; border-collapse:collapse; }
  .corralones-table th, .corralones-table td { text-align:left; padding:10px; border-bottom:1px solid #e8edf4; font-size:13px; vertical-align:middle; }
  .corralones-table th { background:#f7f9fc; color:#51627c; font-weight:700; }
  .corralones-table input[type="text"], .corralones-table input[type="number"] {
    width:100%;
    padding:8px 10px;
    border:1px solid #cfd8e3;
    border-radius:8px;
    outline:none;
    font-size:13px;
  }
  .switch { position:relative; display:inline-block; width:46px; height:26px; }
  .switch input { opacity:0; width:0; height:0; }
  .slider {
    position:absolute;
    cursor:pointer;
    top:0; left:0; right:0; bottom:0;
    background:#cbd5e1;
    transition:.2s;
    border-radius:999px;
  }
  .slider:before {
    position:absolute;
    content:"";
    height:20px;
    width:20px;
    left:3px;
    bottom:3px;
    background:white;
    transition:.2s;
    border-radius:50%;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .switch input:checked + .slider { background:#22c55e; }
  .switch input:checked + .slider:before { transform:translateX(20px); }

  .header-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">🏗 Materiales Ya <span>Todo para tu obra</span></a>
  <div class="nav-links" id="navLinks">
    <a href="calculadores.html" class="nav-link active">Calculadores</a>
    <a href="marketplace.html" class="nav-link">Pedir materiales</a>
    <a href="mapa.html" class="nav-link">📍 Mapa</a>
    <a href="registro.html" class="nav-link" style="background:#1a4a8a;border-color:#1a4a8a;">+ Sumá tu negocio</a>
    <a href="javascript:void(0)" class="nav-link btn-editar" onclick="abrirModalCorralones()">EDITAR corralones</a>
    <a href="javascript:void(0)" class="nav-link btn-salir" onclick="salirCorralones()">SALIR</a>
  </div>

  <button class="menu-toggle" id="menuToggle">&#9776;</button>
</nav>

<main>
  <div class="cat-tabs">
    <button class="cat-btn active" onclick="showCat('estructura',this)">🏗 Estructura</button>
    <button class="cat-btn" onclick="showCat('mamposteria',this)">🧱 Mampostería</button>
    <button class="cat-btn" onclick="showCat('terminacion',this)">🎨 Terminación</button>
    <button class="cat-btn" onclick="showCat('seco',this)">📐 Seco</button>
    <button class="cat-btn" onclick="showCat('instalaciones',this)">🔌 Instalaciones</button>
    <button class="cat-btn" onclick="showCat('ferreteria',this)">🔩 Ferretería</button>
  </div>

  <!-- TODO: pegá acá tu contenido original completo de calculadoras -->
  <!-- No te lo vuelvo a reescribir entero para no romperte nada más -->
</main>

<footer>
  <a href="index.html">Inicio</a>
  <a href="marketplace.html">Marketplace</a>
  <a href="revista.html">Revista</a>
</footer>

<div id="modalCorralones" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-head">
      <h3>Editar corralones</h3>
      <button class="modal-close" onclick="cerrarModalCorralones()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-toolbar">
        <button onclick="agregarFilaCorralon()">+ Agregar corralón</button>
        <button class="btn-secondary" onclick="cargarDemoCorralones()">Cargar ejemplo</button>
      </div>

      <div style="overflow-x:auto;">
        <table class="corralones-table">
          <thead>
            <tr>
              <th>Activo</th>
              <th>Empresa</th>
              <th>Zona</th>
              <th>Teléfono</th>
              <th>Tarifa</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tbodyCorralones"></tbody>
        </table>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px;flex-wrap:wrap;">
        <button class="btn-secondary" onclick="cerrarModalCorralones()">Cancelar</button>
        <button onclick="guardarCorralones()">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>

<script>
function showCat(id, btn) {
  document.querySelectorAll('.cat-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('cat-' + id);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
}

function showMat(cat, id, btn) {
  const catEl = document.getElementById('cat-' + cat);
  if (!catEl) return;
  catEl.querySelectorAll('.mat-panel').forEach(p => p.classList.remove('active'));
  catEl.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('mat-' + id);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
}

const navLinks = document.getElementById('navLinks');
const menuToggle = document.getElementById('menuToggle');
if (menuToggle && navLinks) {
  menuToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
}

let corralones = [
  { activo:true, nombre:"Corralón San Martín", zona:"Centro", telefono:"3415551000", tarifa:"500" },
  { activo:true, nombre:"Materiales del Norte", zona:"Fisherton", telefono:"3415552000", tarifa:"500" },
  { activo:true, nombre:"Corralón La Obra", zona:"Funes", telefono:"3415553000", tarifa:"500" }
];

function abrirModalCorralones() {
  document.getElementById('modalCorralones').classList.add('active');
  renderCorralones();
}

function cerrarModalCorralones() {
  document.getElementById('modalCorralones').classList.remove('active');
}

function salirCorralones() {
  cerrarModalCorralones();
}

function cargarDemoCorralones() {
  corralones = [
    { activo:true, nombre:"Corralón San Martín", zona:"Centro", telefono:"3415551000", tarifa:"500" },
    { activo:true, nombre:"Materiales del Norte", zona:"Fisherton", telefono:"3415552000", tarifa:"500" },
    { activo:false, nombre:"Corralón La Obra", zona:"Funes", telefono:"3415553000", tarifa:"500" }
  ];
  renderCorralones();
}

function agregarFilaCorralon() {
  corralones.push({ activo:true, nombre:"", zona:"", telefono:"", tarifa:"" });
  renderCorralones();
}

function eliminarFilaCorralon(i) {
  corralones.splice(i, 1);
  renderCorralones();
}

function renderCorralones() {
  const tbody = document.getElementById('tbodyCorralones');
  if (!tbody) return;
  tbody.innerHTML = corralones.map((e, i) => `
    <tr>
      <td>
        <label class="switch">
          <input type="checkbox" ${e.activo ? 'checked' : ''} onchange="corralones[${i}].activo=this.checked">
          <span class="slider"></span>
        </label>
      </td>
      <td><input type="text" value="${escapeHtml(e.nombre)}" oninput="corralones[${i}].nombre=this.value"></td>
      <td><input type="text" value="${escapeHtml(e.zona)}" oninput="corralones[${i}].zona=this.value"></td>
      <td><input type="text" value="${escapeHtml(e.telefono)}" oninput="corralones[${i}].telefono=this.value"></td>
      <td><input type="number" value="${escapeHtml(e.tarifa)}" oninput="corralones[${i}].tarifa=this.value"></td>
      <td><button class="btn-danger" onclick="eliminarFilaCorralon(${i})">Eliminar</button></td>
    </tr>
  `).join('');
}

function guardarCorralones() {
  google.script.run
    .withSuccessHandler(() => {
      alert('Corralones guardados.');
      cerrarModalCorralones();
    })
    .withFailureHandler(err => {
      alert('Error: ' + (err && err.message ? err.message : err));
    })
    .saveCorralones({
      activo_global: true,
      modificado_en: new Date().toISOString(),
      corralones: corralones
    });
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}
</script>

</body>
</html>
