<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa — Materiales Ya</title>
  <style>
    body{margin:0;font-family:system-ui;background:#eef2f7;color:#1a2744}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .card{background:#fff;border:1px solid #d0dcea;border-radius:14px;padding:16px}
    .list{display:grid;gap:10px}
    .item{padding:12px;border:1px solid #e1e7ef;border-radius:12px;background:#fbfcfe}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#e8eef5;font-size:12px;font-weight:700}
    a{color:#1a2744}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Mapa de negocios</h1>
      <p>Lee <code>materiales.json</code> y muestra solo los negocios activos.</p>
      <div id="list" class="list"></div>
    </div>
  </div>
  <script>
    async function run(){
      const r=await fetch('materiales.json',{cache:'no-store'});
      const data=await r.json();
      const list=(data.businesses||[]).filter(b=>b.active);
      document.getElementById('list').innerHTML=list.map(b=>`<div class='item'><strong>${b.name}</strong> <span class='badge'>Activo</span><div>${b.address||''}</div><div>${b.phone||''} · ${b.hours||''}</div><div><a target='_blank' href='https://www.google.com/maps?q=${b.lat},${b.lng}'>Ver en Google Maps</a></div></div>`).join('')||'<p>No hay negocios activos.</p>';
    }
    run();
  </script>
</body>
</html>
