<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sumá tu negocio | Materiales Ya</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#eef2f7;
      color:#1a1a1a;
      min-height:100vh;
    }
    nav{
      background:#1a2744;
      padding:1rem 2rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:12px;
      position:relative;
    }
    nav .logo{
      color:#fff;
      font-size:1.2rem;
      font-weight:700;
      text-decoration:none;
    }
    nav .logo span{
      color:#90afd4;
      font-weight:400;
      font-size:.85rem;
      margin-left:8px;
    }
    .nav-links{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .nav-link{
      padding:6px 14px;
      border-radius:7px;
      border:1px solid #2e4a7a;
      color:#90afd4;
      font-size:12px;
      text-decoration:none;
      transition:all .15s;
    }
    .nav-link:hover,
    .nav-link.active{
      background:#fff;
      color:#1a2744;
      border-color:#fff;
    }
    main{
      max-width:760px;
      margin:2rem auto;
      padding:0 1rem;
    }
    .card{
      background:#fff;
      border:1px solid #d0dcea;
      border-radius:14px;
      padding:1.5rem;
      box-shadow:0 6px 20px rgba(26,39,68,.05);
    }
    .card h1{
      font-size:1.8rem;
      color:#1a2744;
      margin-bottom:.5rem;
    }
    .card p{
      color:#4b5b73;
      line-height:1.6;
      margin-bottom:1rem;
    }
    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    @media(max-width:600px){
      .grid-2{grid-template-columns:1fr}
      nav{padding:.875rem 1rem}
      nav .logo span{display:none}
      .nav-links{display:none}
    }
    .field{margin-bottom:1rem}
    .field label{
      display:block;
      font-size:12px;
      color:#666;
      margin-bottom:5px;
      font-weight:500;
    }
    .field input,
    .field select,
    .field textarea{
      width:100%;
      padding:10px 12px;
      border:1px solid #cfd8e3;
      border-radius:10px;
      font-size:14px;
      color:#1a1a1a;
      background:#fafbfd;
      outline:none;
      transition:border .15s;
      font-family:inherit;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus{
      border-color:#1a2744;
      background:#fff;
    }
    .btn{
      border:none;
      border-radius:10px;
      padding:12px 16px;
      cursor:pointer;
      font-weight:600;
      font-size:14px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#1a2744;
      color:#fff;
    }
    .btn.secondary{
      background:#e8eef5;
      color:#1a2744;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:1rem;
    }
    .footer{
      text-align:center;
      padding:2rem 1rem;
      font-size:12px;
      color:#aaa;
      line-height:1.8;
    }
    .footer a{
      color:#5a8abf;
      text-decoration:none;
      margin:0 8px;
    }
    .footer-secret{
      background:transparent;
      border:none;
      color:#5a8abf;
      text-decoration:none;
      margin:0 8px;
      padding:0;
      font:inherit;
      cursor:pointer;
    }
    .footer-secret:hover{
      text-decoration:underline;
    }
    .admin-modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:16px;
    }
    .admin-box{
      position:relative;
      background:#fff;
      width:min(92vw,380px);
      border-radius:14px;
      padding:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.25);
      text-align:center;
    }
    .admin-box h3{
      margin:0 0 12px;
      color:#1a2744;
      font-size:1.1rem;
    }
    .admin-box input{
      width:100%;
      padding:10px 12px;
      border:1px solid #cfd8e3;
      border-radius:10px;
      margin:8px 0 12px;
      font-size:14px;
      outline:none;
    }
    .admin-box button{
      border:none;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      background:#1a2744;
      color:#fff;
      font-weight:600;
    }
    .admin-close{
      position:absolute;
      top:10px;
      right:10px;
      width:32px;
      height:32px;
