<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sumá tu negocio | Materiales Ya</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#eef2f7;
      color:#1a1a1a;
      min-height:100vh;
    }
    nav{
      background:#1a2744;
      padding:1rem 2rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:12px;
      position:relative;
    }
    nav .logo{
      color:#fff;
      font-size:1.2rem;
      font-weight:700;
      text-decoration:none;
    }
    nav .logo span{
      color:#90afd4;
      font-weight:400;
      font-size:.85rem;
      margin-left:8px;
    }
    .nav-links{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .nav-link{
      padding:6px 14px;
      border-radius:7px;
      border:1px solid #2e4a7a;
      color:#90afd4;
      font-size:12px;
      text-decoration:none;
      transition:all .15s;
    }
    .nav-link:hover,
    .nav-link.active{
      background:#fff;
      color:#1a2744;
      border-color:#fff;
    }
    main{
      max-width:760px;
      margin:2rem auto;
      padding:0 1rem;
    }
    .card{
      background:#fff;
      border:1px solid #d0dcea;
      border-radius:14px;
      padding:1.5rem;
      box-shadow:0 6px 20px rgba(26,39,68,.05);
    }
    .card h1{
      font-size:1.8rem;
      color:#1a2744;
      margin-bottom:.5rem;
    }
    .card p{
      color:#4b5b73;
      line-height:1.6;
      margin-bottom:1rem;
    }
    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    @media(max-width:600px){
      .grid-2{grid-template-columns:1fr}
      nav{padding:.875rem 1rem}
      nav .logo span{display:none}
      .nav-links{display:none}
    }
    .field{margin-bottom:1rem}
    .field label{
      display:block;
      font-size:12px;
      color:#666;
      margin-bottom:5px;
